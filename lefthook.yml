output:
  - failure

pre-commit:
  commands:
    check-unencrypted-assets:
      run: |
        failed=0
        for file in $(git diff --cached --name-only --diff-filter=ACM | grep "^packages/sushii-worker/assets/.*\.png$"); do
          base="${file%.png}"
          if [ -f "${base}.png.age" ]; then
            echo "ERROR: '$file' has an encrypted counterpart '${base}.png.age' — commit the .png.age instead."
            echo "Run 'bun run assets:encrypt' in packages/sushii-worker to encrypt new assets."
            failed=1
          fi
        done
        exit $failed
    verify-asset-mapping:
      run: |
        if git diff --cached --name-only | grep -qE "^packages/sushii-worker/(scripts/asset-mapping\.ts|assets/)"; then
          cd packages/sushii-worker && bun run assets:verify
        fi
    check-emoji-types:
      run: |
        if git diff --cached --name-only | grep -qE "^packages/sushii-worker/(scripts/asset-mapping\.ts|src/features/bot-emojis/domain/BotEmojiName\.ts)"; then
          cd packages/sushii-worker && bun typecheck
        fi
