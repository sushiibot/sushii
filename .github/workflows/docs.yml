name: Docs

on:
  push:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --immutable
        working-directory: ./docs

      - name: Build Docs
        run: bun run build
        working-directory: ./docs
        env:
          NEXT_PUBLIC_SUSHII_STATS_URL: ${{ vars.NEXT_PUBLIC_SUSHII_STATS_URL }}

      - name: Check critical legal pages
        working-directory: ./docs
        run: |
          grep -q "Interpretation and Definitions" out/privacy.html \
            || (echo "FAIL: /privacy is missing expected Privacy Policy content" && exit 1)
          grep -q "Terms of Service" out/tos.html \
            || (echo "FAIL: /tos is missing expected Terms of Service content" && exit 1)
          echo "OK: /privacy and /tos verified"

      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: github-pages
          path: ./docs/out/

  deploy:
    name: Deploy Docs
    needs: build
    if: false # paused until sushii bot + API is ready
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
