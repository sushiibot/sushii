name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".github/workflows/docs.yml"

jobs:
  test:
    name: Test sushii-worker
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-bookworm
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install sushii-worker dependencies
        run: bun install --immutable

      - name: Typecheck sushii-worker
        run: cd packages/sushii-worker && bun run typecheck

      - name: Initialize database roles
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f packages/sushii-worker/drizzle/init.sql

      - name: Run drizzle database migrations
        working-directory: ./packages/sushii-worker
        run: |
          cp .env.ci .env
          bun run drizzle-kit migrate

      - name: Run unit tests
        env:
          # For some reason ryuk causes the testcontainer log wait to fail:
          #  error: Log message "/.*Started.*/" not received after 60000ms
          TESTCONTAINERS_RYUK_DISABLED: true
        run: |
          cp ./packages/sushii-worker/.env.ci ./packages/sushii-worker/.env
          cd ./packages/sushii-worker
          bun test --timeout 30000

      - name: Run integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
        run: |
          cd ./packages/sushii-worker
          bun test --timeout 30000 ./tests/integration/

  docker-build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get short SHA
        id: sha
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: .
          file: ./packages/sushii-worker/Dockerfile
          build-args: |
            GIT_HASH=${{ steps.sha.outputs.sha_short }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/sushiibot/sushii-worker:latest
            ghcr.io/sushiibot/sushii-worker:${{ steps.sha.outputs.sha_short }}
          cache-from: type=registry,ref=ghcr.io/sushiibot/sushii-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/sushiibot/sushii-worker:buildcache,mode=max

  sentry-release:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: sushii
          SENTRY_PROJECT: sushii-ts
        with:
          version: ${{ needs.docker-build.outputs.sha_short }}

  deploy-staging:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/deploy.yml@main
    with:
      service: sushii-bot/sushii-bot-staging
      image_version: ${{ needs.docker-build.outputs.sha_short }}
      environment: staging
    secrets: inherit

  deploy-production:
    needs: [docker-build, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/deploy-blue-green.yml@main
    with:
      image_version: ${{ needs.docker-build.outputs.sha_short }}
      environment: production
      dry_run: true
    secrets: inherit

  docker-cleanup:
    needs: [docker-build, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: sushiibot/sushii-workflows/.github/workflows/docker-cleanup.yml@main
    with:
      image_name: ghcr.io/sushiibot/sushii-worker
    permissions:
      packages: write
