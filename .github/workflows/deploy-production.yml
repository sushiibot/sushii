name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pre-deploy-summary:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}

    steps:
      - name: Get short SHA
        id: sha
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout sushii-ansible
        uses: actions/checkout@v4
        with:
          repository: sushiibot/sushii-ansible
          token: ${{ secrets.ANSIBLE_REPO_TOKEN }}
          path: sushii-ansible

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install script dependencies
        working-directory: sushii-ansible/scripts
        run: bun install --frozen-lockfile

      - name: Pre-deploy summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run sushii-ansible/scripts/deploy-sushii-bot.ts --summary --sha ${{ steps.sha.outputs.sha_short }}

  deploy:
    needs: pre-deploy-summary
    uses: sushiibot/sushii-workflows/.github/workflows/deploy-blue-green.yml@main
    with:
      image_version: ${{ needs.pre-deploy-summary.outputs.sha_short }}
      environment: production
      dry_run: false
    secrets: inherit
