name: Build and Deploy sushii-mcp

on:
  push:
    branches:
      - main
    paths:
      - "packages/sushii-mcp/**"
      - "packages/sushii-worker/src/infrastructure/database/schema.ts"
      - ".github/workflows/sushii-mcp-docker.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: .
          file: ./packages/sushii-mcp/Dockerfile
          tags: |
            ghcr.io/sushiibot/sushii-mcp:latest
            ghcr.io/sushiibot/sushii-mcp:${{ steps.sha.outputs.sha_short }}
          cache-from: type=registry,ref=ghcr.io/sushiibot/sushii-mcp:buildcache
          cache-to: type=registry,ref=ghcr.io/sushiibot/sushii-mcp:buildcache,mode=max

  deploy:
    needs: docker-build
    uses: sushiibot/sushii-workflows/.github/workflows/deploy.yml@main
    with:
      service: sushii-bot/sushii-mcp
      image_version: ${{ needs.docker-build.outputs.sha_short }}
      host: sushii-bot
      environment: sushii-mcp
    secrets: inherit

  docker-cleanup:
    needs: docker-build
    uses: sushiibot/sushii-workflows/.github/workflows/docker-cleanup.yml@main
    with:
      image_name: ghcr.io/sushiibot/sushii-mcp
    permissions:
      packages: write
